# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: onboarding-funnel
  displayName: Onboarding Funnel Drop-off
  description: Tracks conversion through the 4-step onboarding funnel and identifies the biggest drop-off step.

spec:
  type: LLM

  trigger:
    mode: automatic
    schedule: daily

  window:
    period: last_7d
    granularity: day

  analysis:
    type: funnel
    entity: person_id
    conversionWindow: 48h
    steps:
      - event: signup_started
        label: Started Signup
      - event: email_verified
        label: Verified Email
      - event: profile_completed
        label: Completed Profile
        filters:
          - property: $current_url
            operator: contains
            value: /onboarding
      - event: first_action_taken
        label: Took First Action
    breakdowns:
      - property: plan
      - property: signup_source

  llm:
    promptTemplate: |
      Analyze this onboarding funnel data for the past 7 days.
      Funnel steps: {{stepsSummary}}
      Biggest drop-off: {{worstStep}} ({{worstStepLoss}} users lost, {{worstStepCvr}} conversion).
      Breakdown by plan: {{breakdownSummary}}
      In 2-3 sentences: identify the most critical drop-off, suggest one hypothesis for why it occurs, and recommend one experiment.
    maxOutputTokens: 400
    guardrails:
      citeSources: true
      noHallucination: true

  privacy:
    excludeProperties:
      - email
      - phone
      - full_name
