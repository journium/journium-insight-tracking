# Auto-migrated from v0Alpha.
# analysis.type=custom uses raw events (discouraged).
# Consider upgrading to analysis.type=funnel for better performance.
# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: signup-to-first-habit
  displayName: Signup to First Habit Dropoff

spec:
  type: LLM

  trigger:
    mode: automatic
    schedule: daily

  window:
    period: last_7d

  analysis:
    type: custom
    rawEvents:
      events:
        - signup_completed
        - habit_created
      maxEvents: 50          # Hard cap at 50; v0Alpha allowed up to 1000
      minEvents: 5
      excludeFields:
        - user_agent
        - device_id
        - session_id
        - page_url
        - page_path

  llm:
    promptTemplate: |
      Analyze the following event data and provide insights about signup to first habit dropoff.
      Data:
      {{rawEventsJson}}
    maxOutputTokens: 500
