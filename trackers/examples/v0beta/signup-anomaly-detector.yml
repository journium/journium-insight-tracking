# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: signup-anomaly-detector
  displayName: Daily Signup Anomaly Detection
  description: Detects days where signup volume deviates more than 2 std devs from the 14-day rolling average.

spec:
  type: LLM

  trigger:
    mode: automatic
    schedule: daily

  window:
    period: last_30d
    granularity: day

  analysis:
    type: anomaly
    metrics:
      - event: signup_completed
        aggregation: count
        label: Daily Signups
        groupBy: day
      - event: signup_completed
        aggregation: uniqueUsers
        label: Unique Signers
        groupBy: day
    baseline:
      type: rolling_average
      windowDays: 14
    threshold:
      stdDeviations: 2.0
    includeTimeSeries: true

  llm:
    promptTemplate: |
      Signup anomaly analysis (last 30 days, 14-day rolling baseline):
      Anomalous days detected: {{anomalyCount}}
      {{#if anomalyCount}}
      Most significant: {{worstAnomaly.date}} — {{worstAnomaly.value}} signups vs {{worstAnomaly.baseline}} baseline (z-score: {{worstAnomaly.zScore}})
      Anomaly list: {{anomalyList}}
      {{else}}
      No anomalies detected. All days within 2σ of baseline.
      {{/if}}
      Time series (last 7 days): {{recentTimeSeries}}
      In 1-2 sentences: summarize anomaly findings and suggest an investigation priority if anomalies were found.
    maxOutputTokens: 350
    guardrails:
      citeSources: true
      noHallucination: true
