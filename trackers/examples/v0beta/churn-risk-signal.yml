# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: churn-risk-signal
  displayName: 14-Day Inactivity Churn Risk
  description: Flags users active in the prior 30 days who have not returned in the last 14 days.

spec:
  type: LLM

  trigger:
    mode: automatic
    schedule:
      cron: "0 9 * * 1"   # Every Monday at 9 AM UTC

  window:
    period: last_30d

  analysis:
    type: churn
    entity: person_id
    activeEvent: session_started
    lookbackPeriod: 30d
    inactivityThreshold: 14d
    segments:
      - property: plan
      - property: country
    metrics:
      - atRiskCount
      - atRiskRate
      - segmentBreakdown

  llm:
    promptTemplate: |
      Churn-risk signal as of today:
      At-risk users (active in last 30d, silent for 14d+): {{atRiskCount}} ({{atRiskRate}}% of active base).
      Segment breakdown: {{segmentBreakdown}}
      Highest-risk segment: {{topRiskSegment}} with {{topRiskRate}}% churn risk.
      In 2 sentences: summarize churn risk severity and call out the highest-risk segment with a recommended intervention.
    maxOutputTokens: 350
    guardrails:
      citeSources: true
      noHallucination: true
