# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: looply-habit-retention
  displayName: Looply Weekly Habit Retention
  description: Measures weekly habit completion retention cohorts to understand long-term user engagement.

spec:
  type: LLM

  trigger:
    mode: automatic
    schedule: weekly

  window:
    period: last_90d
    granularity: week

  analysis:
    type: retention
    entity: person_id
    cohortEvent: signup_completed
    retentionEvent: habit_completed
    cohortPeriod: week
    intervals:
      - 1
      - 7
      - 30
    minCohortSize: 10

  llm:
    promptTemplate: |
      Looply habit retention cohort data (last 90 days, {{cohortCount}} weekly cohorts):
      {{cohortTable}}
      Average retention: D1={{avgD1}}%, D7={{avgD7}}%, D30={{avgD30}}%.
      Most recent cohort ({{latestCohortWeek}}): D1={{latestD1}}%, D7={{latestD7}}%.
      Trend: {{retentionTrend}}.
      Summarize retention health and call out any cohort that performed significantly better or worse. Suggest one hypothesis about what drives long-term habit completion.
    maxOutputTokens: 450
    guardrails:
      citeSources: true
      noHallucination: true

  privacy:
    excludeProperties:
      - email
      - name
