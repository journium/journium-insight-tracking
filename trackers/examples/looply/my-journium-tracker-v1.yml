# yaml-language-server: $schema=https://journium.app/schemas/journium-insight-tracker.schema.json
apiVersion: journium.app/v0Beta
kind: InsightTracker
metadata:
  name: looply-activation-rate
  displayName: Looply Signup-to-First-Habit Activation
  description: Measures how many new Looply users reach the aha moment (habit_created) within 72 hours of signup.

spec:
  type: LLM

  trigger:
    mode: manual

  window:
    period: last_14d
    granularity: day

  analysis:
    type: activation
    entity: person_id
    startEvent: signup_completed
    ahaEvent: habit_created
    activationWindow: 72h
    compareWindow: previous_period
    breakdowns:
      - property: signup_source
      - property: plan

  llm:
    promptTemplate: |
      Looply activation data (last 14 days):
      New signups: {{newSignups}}
      Activated (created first habit within 72h): {{activatedCount}} ({{activationRate}}%)
      vs. previous 14-day period: {{prevActivationRate}}% ({{activationDelta}} pp change)
      Median time to first habit: {{medianTimeToAha}}
      Best activation source: {{bestSource}} ({{bestSourceRate}}%)
      In 2-3 sentences: assess activation health, note the trend, and highlight the highest-leverage acquisition channel.
    maxOutputTokens: 400

  privacy:
    excludeProperties:
      - email
      - name
